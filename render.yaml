services:
  - type: web
    name: queryfy
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: RENDER
        value: "1"
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: GROQ_TEMPERATURE
        value: "0.7"
      - key: GROQ_MAX_TOKENS
        value: "2500"
      - key: GROQ_TIMEOUT
        value: "30"
      - key: GROQ_MAX_RETRIES
        value: "1"
      - key: QUESTION_MAX_ATTEMPTS
        value: "2"
      - key: HOSTED_MAX_QUESTIONS
        value: "5"
      - key: SERVICE_ACCOUNT_JSON
        sync: false
      - key: QUERYFY_DB_PATH
        value: queryfy.db
      - key: RAG_CHUNK_SIZE
        value: "500"
      - key: RAG_CHUNK_OVERLAP
        value: "80"
      - key: RAG_TOP_K
        value: "6"
